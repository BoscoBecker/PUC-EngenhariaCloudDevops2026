name: "Pipeline CI/CD Workflow"

on:
  workflow_dispatch:
  pull_request:
    branches:
     - main  
jobs:

  integracao-continua:
    runs-on: ubuntu-latest
    env:
      FLASK_APP: src/app.py
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Instalando dependencias
        run: pip install -r requirements.txt
      - name: migrar banco de dados
        run: |
          flask db init 
          flask db migrate -m "Initial migration."
          flask db upgrade         
      - name: Executando testes
        run: pytest -v --disable-warnings --maxfail=1
  entrega-continuada:
    needs: integracao-continua
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: Login no DockerHub
        uses: docker/login-action@v4
        with: 
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}
      - name: Configurar o QEMU
        uses: docker/setup-qemu-action@v4
      - name: Configurar o Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_USERNAME }}/puc-engclouddevops2026:latest              
          