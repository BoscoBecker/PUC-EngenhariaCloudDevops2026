<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        body {
            background-color: #eef2f7;
        }
        .login-card {
            background: #ffffff;
            border-radius: 1.25rem;
            box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .login-card img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        .login-card .card-body {
            padding: 2rem;
        }
        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .separator {
            border-top: 1px solid #dee2e6;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-10">
                <div class="login-card row g-0">
                    <div class="col-md-6 d-none d-md-block">
                        <img src="/assets/livros.jpg" alt="Livros" class="img-fluid h-100">
                    </div>
                    <div class="col-md-6">
                        <div class="card-body">
                            <h1 class="login-title mb-3">Cadastro de livros do curso pós PUCPR</h1>
                            <p class="text-muted mb-4">Entre com seu usuário e senha ou cadastre uma nova conta para começar.</p>

                            {% if error %}
                                <div class="alert alert-danger">{{ error }}</div>
                            {% endif %}

                            <form action="/login" method="post">
                                <div class="mb-3">
                                    <label for="username" class="form-label">Usuário</label>
                                    <input type="text" class="form-control" id="username" name="username" placeholder="Digite seu usuário" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Senha</label>
                                    <input type="password" class="form-control" id="password" name="password" placeholder="Digite sua senha" required>
                                </div>
                                <button type="submit" class="btn btn-dark w-100 mb-3">Logar</button>
                            </form>

                            <div class="separator"></div>

                            <div class="text-center">
                                <p class="mb-2 text-muted">Ainda não tem conta?</p>
                                <a href="/createuser" class="btn btn-outline-primary w-100">Cadastrar</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
