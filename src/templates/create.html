<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            background: #ffffff;
            border-radius: 0.75rem;
            box-shadow: 0 0.5rem 1.25rem rgba(0, 0, 0, 0.08);
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="mb-2">Cadastrar livro</h1>
                <p class="text-muted">Preencha os dados abaixo para adicionar um novo livro à biblioteca.</p>
            </div>
        </div>

        <div class="form-container">
            <form action="/create" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label">Título</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="mb-3">
                    <label for="author" class="form-label">Autor</label>
                    <input type="text" class="form-control" id="author" name="author" required>
                </div>
                <div class="mb-3">
                    <label for="issn" class="form-label">ISSN</label>
                    <input type="text" class="form-control" id="issn" name="issn" required>
                </div>
                <div class="mb-3">
                    <label for="date_published" class="form-label">Data de publicação</label>
                    <input type="date" class="form-control" id="date_published" name="date_published" required>
                </div>
                <div class="mb-3">
                    <label for="pages" class="form-label">Páginas</label>
                    <input type="number" class="form-control" id="pages" name="pages" min="1" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark">Cadastrar</button>
                    <a href="/books" class="btn btn-outline-secondary">Voltar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
